name: CI On Demand

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  run-tests:
    name: Run full test suite on demand
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install chromadb requests

      - name: Run full test suite
        run: pytest -q

      - name: Run memory summarizer tests
        run: pytest tests/test_memory_summarizer.py -v

      - name: Run code engineer tests
        run: pytest tests/test_code_engineer.py tests/test_code_engineer_sandbox.py -v
