name: CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install chromadb requests

      - name: Run full test suite
        run: pytest -q

      - name: Run memory summarizer tests (isolated)
        run: pytest tests/test_memory_summarizer.py -v

      - name: Run code engineer tests (isolated)
        run: pytest tests/test_code_engineer.py -v
